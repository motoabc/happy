# .github/workflows/sync-upstream.yml
name: Sync Upstream

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: true

env:
  # 🔗 上游仓库地址（优先级: Repository Variables > 此处默认值）
  # 可在 GitHub → Settings → Variables → Actions 中配置 UPSTREAM_REPO 覆盖
  UPSTREAM_REPO: "https://github.com/ORIGINAL/REPO.git"
  
  # 📋 本地保留的文件/目录列表（每行一个路径）
  OVERLAY_PATHS: |
    .github/workflows/build-docker.yml
    .github/workflows/sync-upstream.yml

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          # 支持从 Repository Variables 读取，未配置则用 env 默认值
          UPSTREAM="${{ vars.UPSTREAM_REPO || env.UPSTREAM_REPO }}"
          echo "🔗 Upstream: $UPSTREAM"
          
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "$UPSTREAM"
          git fetch upstream

      - name: Backup overlay files (tar preserve structure)
        run: |
          set -euo pipefail
          mkdir -p /tmp
          
          # 安全遍历 OVERLAY_PATHS（支持空格/特殊字符）
          EXISTING_PATHS=()
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            if [ -e "$path" ]; then
              EXISTING_PATHS+=("$path")
              echo "✓ Found: $path"
            fi
          done <<< "$OVERLAY_PATHS"
          
          # 仅当有文件时才打包
          if [ ${#EXISTING_PATHS[@]} -gt 0 ]; then
            echo "📦 Backing up ${#EXISTING_PATHS[@]} paths..."
            tar -cf /tmp/overlay-backup.tar "${EXISTING_PATHS[@]}"
          else
            echo "⚠️ No overlay paths exist, skipping backup"
          fi

      - name: Record old HEAD
        id: old
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Reset to upstream
        run: |
          BRANCH="${{ github.event.repository.default_branch }}"
          git checkout "$BRANCH"
          git reset --hard upstream/"$BRANCH"

      - name: Restore overlay files
        run: |
          if [ -f /tmp/overlay-backup.tar ]; then
            echo "♻️ Restoring overlay files..."
            tar -xf /tmp/overlay-backup.tar
            echo "✓ Restore complete"
          else
            echo "⚠️ No backup found, skipping restore"
          fi

      - name: Detect changes and commit
        id: diff
        run: |
          set -euo pipefail
          BRANCH="${{ github.event.repository.default_branch }}"
          
          git add -A
          
          # 对比 git tree（内容哈希，忽略时间戳）
          OLD_TREE=$(git rev-parse ${{ steps.old.outputs.sha }}^{tree})
          NEW_TREE=$(git write-tree)
          
          echo "Old tree: $OLD_TREE"
          echo "New tree: $NEW_TREE"
          
          if [ "$OLD_TREE" = "$NEW_TREE" ]; then
            echo "✅ No changes detected in upstream or overlays."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "🔄 Changes detected. Committing..."
            if [ -n "${GITHUB_ACTIONS:-}" ]; then
              git diff --name-status "$OLD_TREE" "$NEW_TREE" || true
            fi
            git commit -m "sync: upstream @ ${BRANCH} + overlay"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Force Push (with lease safety)
        if: steps.diff.outputs.changed == 'true'
        run: |
          BRANCH="${{ github.event.repository.default_branch }}"
          echo "📤 Pushing to origin/$BRANCH..."
          git push origin "$BRANCH" --force-with-lease
          echo "✓ Push complete"

      - name: Trigger Build via repository_dispatch
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          BRANCH="${{ github.event.repository.default_branch }}"
          
          echo "🔔 Sending repository_dispatch to $REPO..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/dispatches" \
            -d "{
              \"event_type\": \"sync-complete\",
              \"client_payload\": {
                \"ref\": \"${BRANCH}\",
                \"synced_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }
            }")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          if [ "$HTTP_CODE" = "204" ]; then
            echo "✅ Dispatch sent successfully"
          else
            echo "::warning::Dispatch returned HTTP $HTTP_CODE"
            echo "Response body: $(echo "$RESPONSE" | head -n -1)"
          fi
