# .github/workflows/build-docker.yml
name: Build Docker Images

on:
  repository_dispatch:
    types: [sync-complete, upstream-synced]
  workflow_dispatch:
    inputs:
      dockerfile:
        description: 'Dockerfile to build'
        required: true
        default: 'Dockerfile.server'
        type: choice
        options:
          - Dockerfile.server
          - Dockerfile
          - Dockerfile.webapp
      push_image:
        description: 'Push to registry'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NTFY_SERVER: "${{ vars.NTFY_SERVER || 'https://ntfy.sh' }}"
  NTFY_TOPIC: "${{ vars.NTFY_TOPIC || 'github-actions-build' }}"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          # - linux/arm64  # 首次测试时注释，成功后启用
    
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 确保完整历史用于缓存

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=auto
            prefix=server-
          tags: |
            type=raw,value=${{ github.event.client_payload.upstream_sha || github.sha }},priority=300
            type=ref,event=branch,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile || 'Dockerfile.server' }}
          push: ${{ inputs.push_image != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max
          # ✅ 官方 Dockerfile 已处理 postinstall，无需额外参数
          build-args: |
            NODE_ENV=production
            SKIP_HAPPY_WIRE_BUILD=1
          provenance: false
          sbom: false

      - name: Generate summary
        if: always()
        run: |
          echo "## 🐳 Build Summary (${{ matrix.platform }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Platform** | ${{ matrix.platform }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dockerfile** | \`${{ inputs.dockerfile || 'Dockerfile.server' }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Tags** | <pre>$(echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n')</pre> |" >> $GITHUB_STEP_SUMMARY
            if [ -n "${{ steps.build.outputs.digest }}" ]; then
              echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send ntfy notification
        run: |
          set -euo pipefail
          
          NTFY_SERVER="${{ env.NTFY_SERVER }}"
          NTFY_TOPIC="${{ vars.NTFY_TOPIC }}"
          NTFY_TOKEN="${{ secrets.NTFY_TOKEN }}"
          
          STATUS="${{ needs.build.result }}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          UPSTREAM_SHA="${{ github.event.client_payload.upstream_sha || github.sha }}"
          
          if [ "$STATUS" = "success" ]; then
            PRIORITY="3"
            TAGS="white_check_mark,package,rocket"
            TITLE="✅ Build Success: $REPO"
            MSG="🐳 Dockerfile.server 构建成功

            🔖 SHA: \`${UPSTREAM_SHA:0:7}\`
            📦 \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`
            🏷️ \`${{ needs.build.outputs.image_tag }}\`
            
            [🔗 查看日志]($RUN_URL)"
                    elif [ "$STATUS" = "failure" ]; then
                        PRIORITY="5"
                        TAGS="x,rotating_light,package"
                        TITLE="❌ Build Failed: $REPO"
                        MSG="🚨 Dockerfile.server 构建失败

            🔖 SHA: \`${UPSTREAM_SHA:0:7}\`
            
            [🔗 查看日志]($RUN_URL)"
                    else
                        PRIORITY="2"
                        TAGS="question,package"
                        TITLE="⚠️ Build Unknown: $REPO"
                        MSG="❓ 状态: $STATUS
            [🔗 查看运行]($RUN_URL)"
          fi
          
          CURL_HEADERS="-H \"Title: $TITLE\" -H \"Priority: $PRIORITY\" -H \"Tags: $TAGS\" -H \"Markdown: true\" -H \"Click: $RUN_URL\""
          if [ -n "$NTFY_TOKEN" ]; then
            CURL_HEADERS="$CURL_HEADERS -H \"Authorization: Bearer $NTFY_TOKEN\""
          fi
          
          echo "🔔 Sending to $NTFY_SERVER/$NTFY_TOPIC"
          HTTP_CODE=$(curl -s -w "%{http_code}" -X POST $CURL_HEADERS "$NTFY_SERVER/$NTFY_TOPIC" -d "$MSG")
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Notification sent"
          else
            echo "::warning::ntfy returned HTTP $HTTP_CODE"
          fi
