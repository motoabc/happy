# .github/workflows/build-docker.yml
name: Build Docker Images

on:
  repository_dispatch:
    types: [sync-complete, upstream-synced]
  workflow_dispatch:
    inputs:
      dockerfile:
        description: 'Dockerfile to build'
        required: true
        default: 'Dockerfile.server'
        type: choice
        options:
          - Dockerfile.server
          - Dockerfile
          - Dockerfile.webapp
      push_image:
        description: 'Push to registry'
        required: false
        default: true
        type: boolean

env:
  # 🐳 Docker 配置
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  
  # 🔔 ntfy 全局参数
  NTFY_SERVER: "${{ vars.NTFY_SERVER || 'https://ntfy.sh' }}"
  NTFY_TOPIC: "${{ vars.NTFY_TOPIC || 'github-actions-build' }}"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=auto
            prefix=server-
          tags: |
            type=raw,value=${{ github.event.client_payload.upstream_sha || github.sha }},priority=300
            type=ref,event=branch,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile || 'Dockerfile.server' }}
          push: ${{ inputs.push_image != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
          provenance: false

      - name: Generate summary
        if: always()
        run: |
          echo "## 🐳 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**: \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send ntfy notification
        run: |
          set -euo pipefail
          
          STATUS="${{ needs.build.result }}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          UPSTREAM_SHA="${{ github.event.client_payload.upstream_sha || github.sha }}"
          
          if [ "$STATUS" = "success" ]; then
            PRIORITY="3"
            TAGS="white_check_mark,package,rocket"
            TITLE="✅ Build Success: $REPO"
            MSG="🐳 构建成功

  🔖 SHA: \`${UPSTREAM_SHA:0:7}\`
  📦 \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`
  🏷️ \`${{ needs.build.outputs.image_tag }}\`"
          elif [ "$STATUS" = "failure" ]; then
            PRIORITY="5"
            TAGS="x,rotating_light,package"
            TITLE="❌ Build Failed: $REPO"
            MSG="🚨 构建失败

  🔖 SHA: \`${UPSTREAM_SHA:0:7}\`
  🔍 请查看日志"
          else
            PRIORITY="2"
            TAGS="question,package"
            TITLE="⚠️ Build Unknown: $REPO"
            MSG="❓ 状态：$STATUS"
          fi
          
          CURL_CMD=(curl -s -X POST
            -H "Title: $TITLE"
            -H "Priority: $PRIORITY"
            -H "Tags: $TAGS"
            -H "Markdown: true"
            -H "Click: $RUN_URL"
          )
          
          # 添加 Token 认证（如果配置了）
          if [ -n "${{ secrets.NTFY_TOKEN }}" ]; then
            CURL_CMD+=(-H "Authorization: Bearer ${{ secrets.NTFY_TOKEN }}")
          fi
          
          CURL_CMD+=("${{ env.NTFY_SERVER }}/${{ vars.NTFY_TOPIC }}" -d "$MSG")
          "${CURL_CMD[@]}"
          
          echo "✅ Notification sent"
