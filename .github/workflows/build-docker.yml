# .github/workflows/build-docker.yml
name: Build Docker Images

on:
  repository_dispatch:
    types: [sync-complete, upstream-synced]
  workflow_dispatch:
    inputs:
      dockerfile:
        description: 'Dockerfile to build'
        required: true
        default: 'Dockerfile.server'
        type: choice
        options:
          - Dockerfile.server
          - Dockerfile
          - Dockerfile.webapp
      push_image:
        description: 'Push to registry'
        required: false
        default: true
        type: boolean
      skip_postinstall:
        description: 'Skip yarn postinstall scripts'
        required: false
        default: true
        type: boolean

env:
  # 🐳 Docker 配置
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  
  # 🔔 ntfy 全局参数（优先级：Repository Variables > 默认值）
  NTFY_SERVER: "${{ vars.NTFY_SERVER || 'https://ntfy.sh' }}"
  NTFY_TOPIC: "${{ vars.NTFY_TOPIC || 'github-actions-build' }}"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          # - linux/arm64  # ⚠️ 首次测试时注释，成功后取消注释
    
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=auto
            prefix=server-
          tags: |
            type=raw,value=${{ github.event.client_payload.upstream_sha || github.sha }},priority=300
            type=ref,event=branch,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Patch Dockerfile (skip postinstall if needed)
        if: inputs.skip_postinstall == true
        run: |
          # 如果 Dockerfile 包含 yarn install 但未加 --ignore-scripts，自动添加
          if grep -q "yarn install.*--frozen-lockfile" Dockerfile.server && ! grep -q "\-\-ignore-scripts" Dockerfile.server; then
            sed -i 's/yarn install --frozen-lockfile --ignore-engines/yarn install --frozen-lockfile --ignore-engines --ignore-scripts/' Dockerfile.server
            echo "✅ Patched: added --ignore-scripts to yarn install"
          fi

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile || 'Dockerfile.server' }}
          push: ${{ inputs.push_image != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max
          build-args: |
            NODE_ENV=production
            SKIP_HAPPY_WIRE_BUILD=1
            YARN_ENABLE_SCRIPTS=${{ inputs.skip_postinstall == true && 'false' || 'true' }}
          provenance: false
          sbom: false

      - name: Generate summary
        if: always()
        run: |
          echo "## 🐳 Build Summary (${{ matrix.platform }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Platform** | ${{ matrix.platform }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dockerfile** | \`${{ inputs.dockerfile || 'Dockerfile.server' }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Tags** | <pre>$(echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n')</pre> |" >> $GITHUB_STEP_SUMMARY
            if [ -n "${{ steps.build.outputs.digest }}" ]; then
              echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send ntfy notification
        run: |
          set -euo pipefail
          
          # 📋 全局参数 + Secrets
          NTFY_SERVER="${{ env.NTFY_SERVER }}"
          NTFY_TOPIC="${{ vars.NTFY_TOPIC }}"
          NTFY_TOKEN="${{ secrets.NTFY_TOKEN }}"
          
          STATUS="${{ needs.build.result }}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          UPSTREAM_SHA="${{ github.event.client_payload.upstream_sha || github.sha }}"
          
          # 🎨 状态样式
          if [ "$STATUS" = "success" ]; then
            PRIORITY="3"
            TAGS="white_check_mark,package,rocket"
            TITLE="✅ Build Success: $REPO"
            MSG="🐳 Dockerfile.server 构建成功

  🔖 SHA: \`${UPSTREAM_SHA:0:7}\`
  📦 \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`
  🏷️ \`${{ needs.build.outputs.image_tag }}\`
  
  [🔗 查看日志]($RUN_URL)"
          elif [ "$STATUS" = "failure" ]; then
            PRIORITY="5"
            TAGS="x,rotating_light,package"
            TITLE="❌ Build Failed: $REPO"
            MSG="🚨 Dockerfile.server 构建失败

  🔖 SHA: \`${UPSTREAM_SHA:0:7}\`
  🔍 可能原因：
  - postinstall 脚本错误
  - 依赖安装超时
  - Prisma 生成失败
  
  [🔗 查看日志]($RUN_URL)"
          else
            PRIORITY="2"
            TAGS="question,package"
            TITLE="⚠️ Build Unknown: $REPO"
            MSG="❓ 构建状态: $STATUS
  [🔗 查看运行]($RUN_URL)"
          fi
          
          # 📤 发送请求
          echo "🔔 Sending to $NTFY_SERVER/$NTFY_TOPIC"
          
          CURL_CMD=(curl -s -w "\n%{http_code}" -X POST
            -H "Title: $TITLE"
            -H "Priority: $PRIORITY"
            -H "Tags: $TAGS"
            -H "Markdown: true"
            -H "Click: $RUN_URL"
          )
          
          # 添加 Token 认证（如果配置了）
          if [ -n "$NTFY_TOKEN" ]; then
            CURL_CMD+=(-H "Authorization: Bearer $NTFY_TOKEN")
            echo "🔐 Using token auth"
          fi
          
          CURL_CMD+=("$NTFY_SERVER/$NTFY_TOPIC" -d "$MSG")
          
          RESPONSE=$("${CURL_CMD[@]}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Notification sent successfully"
          else
            echo "::warning::ntfy returned HTTP $HTTP_CODE"
            echo "Response: $(echo "$RESPONSE" | head -n -1)"
          fi
